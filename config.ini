[TARGET]
# URL login hotspot
url = http://hotspot.login
# Nama hotspot untuk tampilan log
name = "MikroTik Hotspot"

[SETTINGS]
# Karakter yang diuji (angka/huruf)
charset = 1234567890
# Nama class untuk menangkap pesan error
error_class = notice
# Panjang kode voucher
length = 5
# Jeda antar percobaan (detik)
delay_min = 0.5
delay_max = 2.0
# Mode: voucher (pass=user) atau member (pass beda)
mode = voucher

[HISTORY]
file = history.txt
success = success.txt
